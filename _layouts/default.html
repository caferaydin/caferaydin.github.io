<!doctype html>
<html lang="{{ page.lang | default: site.lang }}">
  <head>
    {% include head.html %}
    <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  </head>
  <body>
    <div class="background-layer" aria-hidden="true"></div>
    {% include header.html %}
    <main id="content" class="shell page-shell">
      {{ content }}
    </main>
    {% include footer.html %}
  </body>
</html>
