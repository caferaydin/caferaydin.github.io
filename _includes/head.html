<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0f172a">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
<link rel="canonical" href="{{ page.url | absolute_url }}">
{% if page.lang == 'en' %}
<link rel="alternate" hreflang="tr" href="{{ page.tr_url | absolute_url }}">
<link rel="alternate" hreflang="en" href="{{ page.url | absolute_url }}">
{% else %}
<link rel="alternate" hreflang="tr" href="{{ page.url | absolute_url }}">
<link rel="alternate" hreflang="en" href="{{ page.en_url | absolute_url }}">
{% endif %}
<link rel="alternate" hreflang="x-default" href="{{ '/' | absolute_url }}">
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="{{ page.description | default: site.description }}">
<meta property="og:type" content="website">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:image" content="{{ page.image | default: '/assets/images/og-default.jpg' | absolute_url }}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ page.title | default: site.title }}">
<meta name="twitter:description" content="{{ page.description | default: site.description }}">
{% seo %}
